<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HeatControl OTA</title>
  <style>
    :root {
      --bg-0: #0f1419;
      --bg-1: #151c24;
      --panel-0: #1c252f;
      --panel-1: #26323e;
      --line: #3b4a59;
      --text: #eaf2f7;
      --muted: #9db0bf;
      --warm: #ffb65c;
      --shadow: rgba(0, 0, 0, 0.44);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Bahnschrift", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(120% 90% at 0% 0%, rgba(94, 199, 255, 0.16), transparent 58%),
        radial-gradient(120% 110% at 100% 100%, rgba(255, 182, 92, 0.12), transparent 62%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.03) 0 1px, transparent 1px 22px),
        linear-gradient(180deg, var(--bg-0), var(--bg-1));
      padding: 14px;
    }

    .app {
      max-width: 460px;
      margin: 0 auto;
      display: grid;
      gap: 12px;
    }

    .card {
      border: 1px solid var(--line);
      border-radius: 16px;
      background: linear-gradient(180deg, var(--panel-0), var(--panel-1));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.08), 0 10px 24px var(--shadow);
      padding: 14px;
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 8px;
    }

    .hero-logo {
      width: min(84%, 320px);
      max-width: 320px;
      height: auto;
      object-fit: contain;
      filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.38));
    }

    .title {
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-size: 0.74rem;
      color: #d1dbe3;
      font-weight: 700;
    }

    .hint {
      border: 1px dashed #566777;
      border-radius: 9px;
      background: #1a232b;
      color: #c2cdd6;
      padding: 8px;
      font-size: 0.74rem;
      line-height: 1.35;
      margin: 0 0 10px;
    }

    .file-picker {
      position: relative;
      display: block;
      width: 100%;
      border: 1px solid #566777;
      border-radius: 12px;
      background: #1a232b;
      color: #e3eaf0;
      padding: 14px;
      text-align: center;
      cursor: pointer;
    }

    .file-picker strong {
      display: block;
      font-size: 0.86rem;
      margin-bottom: 4px;
    }

    .file-picker span {
      display: block;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .file-picker input {
      position: absolute;
      inset: 0;
      border: 0;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    .file-name {
      margin-top: 6px;
      text-align: center;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .btn,
    .btn-link {
      border: 1px solid #5d6f81;
      border-radius: 10px;
      background: linear-gradient(180deg, #394450, #2b333d);
      color: var(--text);
      font-size: 0.8rem;
      padding: 10px;
      min-height: 40px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .btn-primary {
      border-color: rgba(255, 182, 92, 0.68);
      background: linear-gradient(180deg, rgba(255, 182, 92, 0.28), rgba(146, 87, 42, 0.56));
      color: #ffe7c7;
      font-weight: 700;
    }

    .note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.73rem;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="card">
      <div class="logo-wrap">
        <img class="hero-logo" src="/LOGO.png" alt="HeatControl Logo">
      </div>
      <div class="title">Firmware Update (OTA)</div>
      <p class="hint">Waehle eine passende <b>firmware.bin</b> aus einem HeatControl-Release und starte danach das Flashen.</p>
      <form method="POST" action="/update" enctype="multipart/form-data">
        <label class="file-picker">
          <strong>Datei auswaehlen</strong>
          <span>Firmware (.bin) aus dem aktuellen Release</span>
          <input type="file" id="firmwareFileInput" name="firmware" accept=".bin" required>
        </label>
        <p class="file-name" id="firmwareFileName">Keine Datei ausgewaehlt.</p>
        <div class="actions">
          <button class="btn btn-primary" type="submit">Upload und Flashen</button>
          <a class="btn-link" href="/">Zurueck zur Konsole</a>
          <a class="btn-link" href="https://github.com/BubTec/HeatControl/releases/latest" target="_blank" rel="noopener">Neueste Version (GitHub)</a>
        </div>
      </form>
      <div class="note">Wichtig: Versorgung waehrend des Updates nicht unterbrechen. Das Geraet startet danach automatisch neu.</div>
    </section>
  </main>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var input = document.getElementById('firmwareFileInput');
      var nameEl = document.getElementById('firmwareFileName');
      if (!input || !nameEl) return;

      var updateName = function () {
        if (input.files && input.files.length) {
          nameEl.textContent = input.files[0].name;
        } else {
          nameEl.textContent = 'Keine Datei ausgewaehlt.';
        }
      };
      input.addEventListener('change', updateName);
    });
  </script>
</body>
</html>
